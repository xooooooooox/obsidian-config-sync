name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            # Pinned to @v2 ON PURPOSE (2026-07-17): Obsidian's automated catalog review only
            # verifies the older Sigstore bundle format. The v4-generation actions — including
            # the official obsidian-sample-plugin template (actions/attest@v4) — produce
            # bundles its checker rejects, even though `gh attestation verify` passes them
            # (confirmed empirically: a v2 re-attestation of the same 0.27.1 digests cleared
            # the errors). Bump only after Obsidian's verifier handles current bundles.
            - name: Attest main.js
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: main.js

            - name: Attest styles.css
              if: steps.styles.outputs.exists == 'true'
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: styles.css

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    --generate-notes \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
