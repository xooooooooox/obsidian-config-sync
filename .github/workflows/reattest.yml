name: Re-attest release assets

# Obsidian's automated review (added ~2026-07-17) rejects attestations produced by the
# v4-generation attest actions — including the official obsidian-sample-plugin template —
# while `gh attestation verify` passes them. This manual job adds an OLDER-format
# (attest-build-provenance@v2) attestation for an existing release's assets, without
# re-cutting: attestations attach per digest, so the review can pick up the compatible one.

on:
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag to re-attest (e.g. 0.27.1)'
                required: true

jobs:
    reattest:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
            attestations: write
        steps:
            - name: Download release assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release download "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" -p main.js -p styles.css || true
                  ls -la

            - name: Attest main.js (v2 bundle format)
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: main.js

            - name: Attest styles.css (v2 bundle format)
              if: ${{ hashFiles('styles.css') != '' }}
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: styles.css
